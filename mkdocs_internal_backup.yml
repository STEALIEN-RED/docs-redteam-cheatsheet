site_name: Red Team Cheat Sheet
site_description: 사내 레드팀/펜테스팅 업무용 치트시트
theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}

nav:
  - 개요: index.md
  - 공격 lifecycle:
    - 외부 정찰 (Reconnaissance): lifecycle/reconnaissance.md
    - 초기 침투 (Initial Access): lifecycle/initial-access.md
    - 내부 정찰 (Discovery): lifecycle/enumeration.md
    - Credential Access: lifecycle/credential-access.md
    - 권한 상승 (Privilege Escalation): lifecycle/privilege-escalation.md
    - 횡적 이동 (Lateral Movement): lifecycle/lateral-movement.md
    - 지속성 (Persistence): lifecycle/persistence.md
    - 데이터 유출 (Exfiltration): lifecycle/exfiltration.md
  - Techniques (심화):
    - OSINT / External Recon: techniques/osint.md
    - Phishing / Vishing: techniques/phishing.md
    - Wireless / WiFi: techniques/wireless.md
    - 물리 침투 / KIOSK: techniques/physical.md
    - Mobile (Android / iOS): techniques/mobile.md
  - 프로토콜별 펜테스트:
    - 개요: protocols/index.md
    - SMB: protocols/smb.md
    - LDAP: protocols/ldap.md
    - Kerberos: protocols/kerberos.md
    - NTLM: protocols/ntlm.md
    - RPC: protocols/rpc.md
    - WinRM: protocols/winrm.md
    - SSH: protocols/ssh.md
    - RDP: protocols/rdp.md
    - FTP: protocols/ftp.md
    - NFS: protocols/nfs.md
    - HTTP: protocols/http.md
    - SMTP: protocols/smtp.md
    - DNS: protocols/dns.md
    - SNMP: protocols/snmp.md
    - MSSQL: protocols/mssql.md
    - MySQL: protocols/mysql.md
    - Redis / PostgreSQL / MongoDB / Elasticsearch: protocols/databases.md
  - Active Directory:
    - AD 환경 공격: ad/ad-environment.md
    - DACL Abuse: ad/dacl-abuse.md
    - NTLM Coercion: ad/coercion.md
    - SCCM/MECM: ad/sccm.md
    - ADCS: ad/adcs.md
  - Web 공격: web/index.md
  - Cloud 공격:
    - 개요: cloud/index.md
    - Kubernetes / Container: cloud/kubernetes.md
  - Defense Evasion: evasion/index.md
  - Operation Infrastructure:
    - 개요: infra/index.md
    - Reverse Shell: infra/shells.md
    - File Transfer: infra/file-transfer.md
    - Pivoting / Tunneling: infra/pivoting.md
    - C2 Framework: infra/c2.md
  - Tool Reference: tools/index.md
